/* ============ Render ============ */
const esc = (s) => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function renderBlock(b) {
  if (b.type === "h") return `<h3 class="ega-h3"><span class="ega-h3-bar"></span>${esc(b.text)}</h3>`;
  if (b.type === "p") return `<p class="ega-p">${b.text}</p>`;
  if (b.type === "callout") return `
    <div class="ega-callout">
      ${b.title ? `<div class="ega-callout-title">${esc(b.title)}</div>` : ""}
      <div class="ega-callout-body">${b.text}</div>
    </div>`;
  if (b.type === "stats") return `
    <div class="ega-stats">
      ${b.items.map(it => `
        <div class="ega-stat">
          <div class="ega-stat-value">${esc(it.value)}</div>
          <div class="ega-stat-label">${esc(it.label)}</div>
        </div>`).join("")}
    </div>`;
  if (b.type === "cards") return `
    <div class="ega-cards">
      ${b.items.map((c, i) => `
        <div class="ega-card">
          <div class="ega-card-head">
            <span class="ega-card-num">${String(i+1).padStart(2,"0")}</span>
            <span class="ega-card-title">${esc(c.title)}</span>
          </div>
          <div class="ega-card-body">${esc(c.body)}</div>
        </div>`).join("")}
    </div>`;
  if (b.type === "steps") return `
    <div class="ega-steps">
      ${b.items.map((s, i) => `
        <div class="ega-step">
          <div class="ega-step-num">${String(i+1).padStart(2,"0")}</div>
          <div>
            <div class="ega-step-title">${esc(s.title)}</div>
            <div class="ega-step-body">${esc(s.body)}</div>
          </div>
        </div>`).join("")}
    </div>`;
  if (b.type === "table") {
    const cols = b.headers.length;
    const style = `grid-template-columns: repeat(${cols}, minmax(0,1fr));`;
    return `
    <div class="ega-table">
      <div class="ega-table-row ega-table-head" style="${style}">
        ${b.headers.map(h => `<div>${esc(h)}</div>`).join("")}
      </div>
      ${b.rows.map(row => `
        <div class="ega-table-row" style="${style}">
          ${row.map(c => `<div>${esc(c)}</div>`).join("")}
        </div>`).join("")}
    </div>`;
  }
  if (b.type === "proscons") return `
    <div class="ega-prosncons">
      <div class="ega-pc">
        <div class="ega-pc-title">Avantajlar</div>
        <ul>${b.pros.map(p => `<li>${esc(p)}</li>`).join("")}</ul>
      </div>
      <div class="ega-pc con">
        <div class="ega-pc-title">Riskler</div>
        <ul>${b.cons.map(p => `<li>${esc(p)}</li>`).join("")}</ul>
      </div>
    </div>`;
  if (b.type === "vaka") return `
    <div class="ega-vaka">
      <div class="ega-vaka-label">Örnek Vaka</div>
      <div class="ega-vaka-title">${esc(b.title)}</div>
      <div class="ega-vaka-grid">
        <div class="ega-vaka-col"><h5>Bağlam</h5><p>${esc(b.baglam)}</p></div>
        <div class="ega-vaka-col"><h5>Analiz</h5><p>${esc(b.analiz)}</p></div>
        <div class="ega-vaka-col"><h5>Sonuç</h5><p>${esc(b.sonuc)}</p></div>
      </div>
    </div>`;
  if (b.type === "takeaways") return `
    <div class="ega-takeaways">
      <h4><span class="ega-h3-bar"></span>Temel Çıkarımlar</h4>
      <ol>${b.items.map(t => `<li>${esc(t)}</li>`).join("")}</ol>
    </div>`;
  return "";
}

function renderHero(s) {
  return `
    <section class="ega-hero">
      <div class="ega-hero-mark">Ek Gelir Akademi · Premium Edisyon</div>
      <h1 class="ega-hero-title">Sosyal Medyada <em>Marka Yönetimi</em></h1>
      <p class="ega-hero-sub">Algoritmaların organik erişimi %2'ye düşürdüğü, Z kuşağının markaları TikTok'ta aradığı, topluluğun en güvenilir reklam mecrası olduğu bir çağ. Bu 8 bölümlük sunum; stratejiden içeriğe, reklamcılıktan analitiğe, topluluk yönetiminden kampanya tasarımına markanızı sosyal medyada profesyonelce yönetmenin tam yol haritasını çiziyor.</p>
      <div class="ega-hero-meta">
        <span><strong>8</strong> Bölüm</span>
        <span><strong>Premium</strong> Sunum Edisyonu</span>
        <span><strong>2026</strong> Türkiye Sürümü</span>
      </div>
      <div class="ega-hero-rule"></div>
      <h3 class="ega-h3"><span class="ega-h3-bar"></span>İçindekiler</h3>
      <div class="ega-toc">
        ${s.toc.map((t, i) => `
          <button class="ega-toc-item" data-jump="${i+1}">
            <span class="ega-toc-num">${String(i+1).padStart(2,"0")}</span>
            <span class="ega-toc-label">${esc(t)}</span>
          </button>`).join("")}
      </div>
    </section>`;
}

function renderSection(s, idx) {
  if (s.hero) return renderHero(s);
  return `
    <section class="ega-section">
      <div class="ega-section-eyebrow">Bölüm ${String(idx).padStart(2,"0")} · Ek Gelir Akademi</div>
      <h2 class="ega-section-title">${s.title}</h2>
      ${s.lead ? `<p class="ega-section-lead">${esc(s.lead)}</p>` : ""}
      ${(s.blocks || []).map(renderBlock).join("")}
    </section>`;
}

/* ============ State + Events ============ */
const state = { activeIndex: 0 };
const $nav = document.getElementById("nav");
const $container = document.getElementById("sectionContainer");
const $scroll = document.getElementById("scroll");
const $progress = document.getElementById("progressFill");
const $progressMini = document.getElementById("progressMini");
const $prev = document.getElementById("prevBtn");
const $next = document.getElementById("nextBtn");
const $prevLabel = document.getElementById("prevLabel");
const $nextLabel = document.getElementById("nextLabel");
const $count = document.getElementById("pagerCount");
const $sidebar = document.getElementById("sidebar");
const $menuToggle = document.getElementById("menuToggle");

// Build sidebar
SECTIONS.forEach((s, i) => {
  const btn = document.createElement("button");
  btn.className = "ega-nav-item";
  btn.dataset.idx = i;
  btn.innerHTML = `<span class="num">${String(i+1).padStart(2,"0")}</span><span class="label">${esc(s.shortTitle)}</span>`;
  btn.addEventListener("click", () => { setActive(i); $sidebar.classList.remove("open"); });
  $nav.appendChild(btn);
});

function setActive(i) {
  if (i < 0 || i >= SECTIONS.length) return;
  state.activeIndex = i;
  $container.innerHTML = renderSection(SECTIONS[i], i);
  // Attach TOC click handlers if hero
  $container.querySelectorAll(".ega-toc-item").forEach(el => {
    el.addEventListener("click", () => setActive(parseInt(el.dataset.jump, 10)));
  });
  // Update sidebar active
  document.querySelectorAll(".ega-nav-item").forEach((el, idx) => {
    el.classList.toggle("active", idx === i);
  });
  // Progress
  const pct = ((i + 1) / SECTIONS.length) * 100;
  $progress.style.width = pct + "%";
  if ($progressMini) $progressMini.style.width = pct + "%";
  // Pager
  $prev.disabled = (i === 0);
  $next.disabled = (i === SECTIONS.length - 1);
  $prevLabel.textContent = i > 0 ? SECTIONS[i - 1].shortTitle : "Başlangıç";
  $nextLabel.textContent = i < SECTIONS.length - 1 ? SECTIONS[i + 1].shortTitle : "Son bölüm";
  $count.textContent = `${String(i+1).padStart(2,"0")} / ${String(SECTIONS.length).padStart(2,"0")}`;
  // Scroll top
  $scroll.scrollTo({ top: 0, behavior: "smooth" });
}

$prev.addEventListener("click", () => setActive(state.activeIndex - 1));
$next.addEventListener("click", () => setActive(state.activeIndex + 1));
if ($menuToggle) $menuToggle.addEventListener("click", () => $sidebar.classList.toggle("open"));

// Keyboard navigation
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") setActive(state.activeIndex + 1);
  if (e.key === "ArrowLeft") setActive(state.activeIndex - 1);
});

// Boot
setActive(0);
</script>
</body>
</html>
